<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace - Dashboard</title>
  <style>
    /* CSS Variables for Light/Dark Mode */
    :root {
      --bg-color: #ffffff;
      --sidebar-bg: #f7f6f3;
      --text-color: #37352f;
      --text-muted: #787774;
      --border-color: #e9e9e7;
      --hover-bg: #efedeb;
      --accent-urgent: #e03131; /* 제출 임박 포인트 컬러 */
      --accent-success: #08a045; /* 피드백 완료 포인트 컬러 */
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
    }

    [data-theme="dark"] {
      --bg-color: #191919;
      --sidebar-bg: #202020;
      --text-color: #ffffff;
      --text-muted: #9b9b9b;
      --border-color: #373737;
      --hover-bg: #2f2f2f;
      --accent-urgent: #ff6b6b;
      --accent-success: #40c057;
    }

    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Layout: Sidebar */
    aside.sidebar {
      width: 250px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .sidebar-header {
      padding: 16px;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 1px solid var(--border-color);
    }

    nav.sidebar-nav {
      flex: 1;
      padding: 10px 0;
      overflow-y: auto;
    }

    .nav-item {
      padding: 8px 16px;
      font-size: 14px;
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background-color 0.2s;
    }

    .nav-item:hover {
      background-color: var(--hover-bg);
    }

    /* Layout: Main Content */
    main.content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Sticky Header */
    header.top-nav {
      position: sticky;
      top: 0;
      background-color: var(--bg-color);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background-color 0.3s;
      z-index: 10;
    }

    header.top-nav.scrolled {
      border-bottom: 1px solid var(--border-color);
    }

    .breadcrumb {
      font-size: 14px;
      color: var(--text-muted);
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    /* Dashboard Grid Layout (New Additions) */
    section.dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      padding: 40px 48px;
      flex: 1;
      overflow-y: auto;
      align-items: start;
    }

    .status-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .status-title {
      font-size: 14px;
      font-weight: 600;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-title.muted {
      color: var(--text-muted);
    }

    .status-count {
      background-color: var(--hover-bg);
      color: var(--text-color);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    /* Task Cards (Minimalist & Brutalism) */
    article.task-card {
      border: 1px solid var(--border-color);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: var(--bg-color);
      transition: border-color 0.2s;
    }

    article.task-card:hover {
      border-color: var(--text-color);
    }

    /* Focus Area (제출 대기) */
    .task-card.focus {
      border-left: 4px solid var(--accent-urgent);
    }

    .task-card.focus .task-meta {
      color: var(--accent-urgent);
      font-weight: 600;
    }

    /* Muted Area (평가 대기) */
    .task-card.muted {
      border-color: transparent;
      border-top: 1px solid var(--border-color); /* Brutalism style horizontal separator */
      background-color: transparent;
    }
    
    .task-card.muted .task-name {
      color: var(--text-muted);
    }

    /* Success Area (피드백 완료) */
    .task-card.success .task-meta.badge {
      color: var(--accent-success);
      font-weight: 600;
    }

    .task-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .task-name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
    }

    /* CTA Buttons */
    .action-btn {
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .action-btn:hover {
      opacity: 0.8;
    }

    .action-btn.solid {
      border: 1px solid var(--text-color);
      background-color: var(--text-color);
      color: var(--bg-color);
      text-align: center;
    }

    .action-btn.outline {
      border: 1px solid var(--border-color);
      color: var(--text-color);
      text-align: center;
    }

    .action-btn.text-only {
      color: var(--text-color);
      text-align: left;
      padding-left: 0;
    }

  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      Jane's Workspace
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item">📄 시작하기</div>
      <div class="nav-item">📝 작업 목록</div>
      <div class="nav-item">💡 아이디어 노트</div>
    </nav>
  </aside>

  <main class="content-area">
    <header class="top-nav" id="topNav">
      <div class="breadcrumb">Jane's Workspace / 작업 목록</div>
      <button class="theme-toggle" id="themeToggle">Dark Mode</button>
    </header>

    <section class="dashboard-grid" id="dashboardArea">
      
      <div class="status-column">
        <div class="status-title">제출 대기 <span class="status-count">2</span></div>
        
        <article class="task-card focus">
          <div class="task-meta">오늘 마감 (D-Day)</div>
          <h3 class="task-name">웹 표준을 준수한 시맨틱 HTML 이력서 마크업</h3>
          <button class="action-btn solid">제출하러 가기</button>
        </article>

        <article class="task-card focus">
          <div class="task-meta" style="color: var(--text-muted); font-weight: normal;">마감: 2026.03.14 (D-4)</div>
          <h3 class="task-name">자바스크립트를 활용한 모달 창 상태 관리 구현</h3>
          <button class="action-btn solid">제출하러 가기</button>
        </article>
      </div>

      <div class="status-column">
        <div class="status-title muted">평가 대기 <span class="status-count">1</span></div>
        
        <article class="task-card muted">
          <div class="task-meta">제출 일시: 2026.03.09 14:30</div>
          <h3 class="task-name">반응형 웹을 위한 CSS Grid/Flexbox 레이아웃 구축</h3>
          <button class="action-btn outline">파일 교체하기</button>
        </article>
      </div>

      <div class="status-column">
        <div class="status-title muted">피드백 완료 <span class="status-count">1</span></div>
        
        <article class="task-card success">
          <div class="task-meta badge">[점수: Pass]</div>
          <h3 class="task-name">다크/라이트 모드 전환을 위한 CSS 변수 설계</h3>
          <button class="action-btn text-only">피드백 확인 ➔</button>
        </article>
      </div>

    </section>
  </main>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    themeToggle.addEventListener('click', () => {
      if (root.getAttribute('data-theme') === 'dark') {
        root.removeAttribute('data-theme');
        themeToggle.textContent = 'Dark Mode';
      } else {
        root.setAttribute('data-theme', 'dark');
        themeToggle.textContent = 'Light Mode';
      }
    });

    // Sticky Header Border on Scroll Logic
    const dashboardArea = document.getElementById('dashboardArea');
    const topNav = document.getElementById('topNav');

    dashboardArea.addEventListener('scroll', () => {
      if (dashboardArea.scrollTop > 10) {
        topNav.classList.add('scrolled');
      } else {
        topNav.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
